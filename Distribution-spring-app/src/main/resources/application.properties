##### Extra Classpath Configuration #####
# Directory containing .jar files loaded into the classpath before Spring context starts.
# Override via EXTRA_CLASSPATH_DIR environment variable.
water.extra.classpath.dir=${EXTRA_CLASSPATH_DIR:/extlib}
##### Extra Component Scan Packages #####
# Comma-separated list of additional packages to scan for Spring/Water components.
# Override via EXTRA_SCAN_PACKAGES environment variable.
water.extra.scan.packages=${EXTRA_SCAN_PACKAGES:}
##### CERTS ######
water.testMode=${WATER_TEST_MODE:false}
water.keystore.type=${WATER_KEYSTORE_TYPE:jks}
water.keystore.password=${WATER_KEYSTORE_PASSWORD:water.}
water.keystore.alias=${WATER_KEYSTORE_ALIAS:server-cert}
water.keystore.file=${WATER_KEYSTORE_FILE:src/main/resources/certs}
water.private.key.password=${WATER_PRIVATE_KEY_PASSWORD:water.}
water.user.admin.default.password=${WATER_ADMIN_DEFAUOT_PASSWORD:}

##### DataSource Configuration ######
spring.datasource.driver-class-name=${DB_DRIVER_CLASS_NAME:org.hsqldb.jdbcDriver}
spring.datasource.url=${DB_HOST:jdbc:hsqldb:mem:waterdb}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:10}
spring.jpa.hibernate.ddl-auto=create-drop
# disabling auto validation since system apis do it automatically
spring.jpa.properties.javax.persistence.validation.mode=none
##### Spring Web Configuration ######
server.port=${SERVER_PORT:8080}
server.servlet.context-path=${SERVER_SERVLET_CONTEXT_PATH:/water}
##### Water Configuration #####


